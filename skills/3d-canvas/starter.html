<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Hand — 3D Session Visualizer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #e0e0e0; font-family: 'SF Mono', 'Fira Code', monospace; overflow: hidden; }
  canvas { display: block; }
  #hud {
    position: fixed; top: 16px; left: 16px; z-index: 10;
    background: rgba(10,10,15,0.85); border: 1px solid #333; border-radius: 8px;
    padding: 12px 16px; font-size: 13px; min-width: 220px;
  }
  #hud h3 { margin-bottom: 8px; color: #7af; font-size: 14px; }
  #hud .stat { margin: 2px 0; }
  #hud .status { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
  .s-running { background: #4f4; } .s-waiting { background: #ff4; }
  .s-idle { background: #888; } .s-error { background: #f44; }
  #status-bar {
    position: fixed; bottom: 16px; left: 16px; z-index: 10;
    background: rgba(10,10,15,0.85); border: 1px solid #333; border-radius: 8px;
    padding: 8px 14px; font-size: 12px;
  }
  .connected { color: #4f4; } .disconnected { color: #f44; }
</style>
</head>
<body>

<div id="hud">
  <h3>Agent Hand 3D</h3>
  <div class="stat"><span class="status s-running"></span>Running: <span id="cnt-running">0</span></div>
  <div class="stat"><span class="status s-waiting"></span>Waiting: <span id="cnt-waiting">0</span></div>
  <div class="stat"><span class="status s-idle"></span>Idle: <span id="cnt-idle">0</span></div>
  <div class="stat"><span class="status s-error"></span>Error: <span id="cnt-error">0</span></div>
  <div class="stat" style="margin-top:6px">Nodes: <span id="cnt-nodes">0</span> | Edges: <span id="cnt-edges">0</span></div>
</div>

<div id="status-bar">
  <span id="ws-status" class="disconnected">Disconnected</span>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── Three.js Setup ───────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0a0f, 0.015);

const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 500);
camera.position.set(0, 20, 40);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(devicePixelRatio);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;

// Lighting
scene.add(new THREE.AmbientLight(0x404060, 0.8));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
dirLight.position.set(10, 20, 10);
scene.add(dirLight);

// Grid
const grid = new THREE.GridHelper(80, 40, 0x222244, 0x111133);
scene.add(grid);

// ── State ────────────────────────────────────────────────────────────
let sessions = [];
let relationships = [];
const nodeMeshes = new Map();  // session.id -> mesh
const edgeLines = new Map();   // rel.id -> line
const nodePositions = new Map(); // session.id -> {x,y,z, vx,vy,vz}

const STATUS_COLORS = {
  running: 0x44ff44, waiting: 0xffff44, idle: 0x888888,
  error: 0xff4444, ready: 0x44aaff,
};

function statusColor(s) { return STATUS_COLORS[s] || 0x888888; }

// ── Force Simulation (simple spring model) ───────────────────────────
function initPosition(id) {
  if (!nodePositions.has(id)) {
    nodePositions.set(id, {
      x: (Math.random() - 0.5) * 30,
      y: (Math.random() - 0.5) * 10 + 5,
      z: (Math.random() - 0.5) * 30,
      vx: 0, vy: 0, vz: 0,
    });
  }
}

function simulate() {
  const nodes = [...nodePositions.entries()];
  const dt = 0.3, friction = 0.85, repulsion = 50, spring = 0.02, restLen = 8;

  // Repulsion between all nodes
  for (let i = 0; i < nodes.length; i++) {
    const [, a] = nodes[i];
    for (let j = i + 1; j < nodes.length; j++) {
      const [, b] = nodes[j];
      let dx = a.x - b.x, dy = a.y - b.y, dz = a.z - b.z;
      let dist = Math.sqrt(dx*dx + dy*dy + dz*dz) || 0.1;
      let f = repulsion / (dist * dist);
      dx *= f; dy *= f; dz *= f;
      a.vx += dx * dt; a.vy += dy * dt; a.vz += dz * dt;
      b.vx -= dx * dt; b.vy -= dy * dt; b.vz -= dz * dt;
    }
  }

  // Spring attraction along edges
  for (const rel of relationships) {
    const a = nodePositions.get(rel.session_a);
    const b = nodePositions.get(rel.session_b);
    if (!a || !b) continue;
    let dx = b.x - a.x, dy = b.y - a.y, dz = b.z - a.z;
    let dist = Math.sqrt(dx*dx + dy*dy + dz*dz) || 0.1;
    let f = spring * (dist - restLen);
    dx = (dx / dist) * f; dy = (dy / dist) * f; dz = (dz / dist) * f;
    a.vx += dx * dt; a.vy += dy * dt; a.vz += dz * dt;
    b.vx -= dx * dt; b.vy -= dy * dt; b.vz -= dz * dt;
  }

  // Center gravity
  for (const [, n] of nodes) {
    n.vx -= n.x * 0.001; n.vy -= (n.y - 5) * 0.002; n.vz -= n.z * 0.001;
    n.vx *= friction; n.vy *= friction; n.vz *= friction;
    n.x += n.vx; n.y += n.vy; n.z += n.vz;
  }
}

// ── Mesh Management ──────────────────────────────────────────────────
const sphereGeo = new THREE.SphereGeometry(0.6, 16, 12);

function rebuildNodes() {
  const alive = new Set(sessions.map(s => s.id));

  // Remove stale
  for (const [id, mesh] of nodeMeshes) {
    if (!alive.has(id)) {
      scene.remove(mesh);
      nodeMeshes.delete(id);
      nodePositions.delete(id);
    }
  }

  for (const s of sessions) {
    initPosition(s.id);
    let mesh = nodeMeshes.get(s.id);
    if (!mesh) {
      const mat = new THREE.MeshStandardMaterial({ color: statusColor(s.status), roughness: 0.4, metalness: 0.3 });
      mesh = new THREE.Mesh(sphereGeo, mat);
      mesh.userData = { id: s.id, title: s.title };
      scene.add(mesh);
      nodeMeshes.set(s.id, mesh);
    }
    mesh.material.color.setHex(statusColor(s.status));
    // Scale running sessions bigger
    const scale = s.status === 'running' ? 1.3 : (s.status === 'waiting' ? 1.1 : 0.8);
    mesh.scale.setScalar(scale);
  }

  document.getElementById('cnt-nodes').textContent = sessions.length;
}

function rebuildEdges() {
  // Clear old
  for (const [, line] of edgeLines) scene.remove(line);
  edgeLines.clear();

  const lineMat = new THREE.LineBasicMaterial({ color: 0x336699, opacity: 0.5, transparent: true });
  for (const rel of relationships) {
    const a = nodePositions.get(rel.session_a);
    const b = nodePositions.get(rel.session_b);
    if (!a || !b) continue;
    const geo = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(a.x, a.y, a.z),
      new THREE.Vector3(b.x, b.y, b.z),
    ]);
    const line = new THREE.Line(geo, lineMat);
    scene.add(line);
    edgeLines.set(rel.id, line);
  }

  document.getElementById('cnt-edges').textContent = relationships.length;
}

function updateMeshPositions() {
  for (const [id, mesh] of nodeMeshes) {
    const p = nodePositions.get(id);
    if (p) mesh.position.set(p.x, p.y, p.z);
  }

  // Update edge geometry
  for (const rel of relationships) {
    const line = edgeLines.get(rel.id);
    if (!line) continue;
    const a = nodePositions.get(rel.session_a);
    const b = nodePositions.get(rel.session_b);
    if (!a || !b) continue;
    const pos = line.geometry.attributes.position;
    pos.setXYZ(0, a.x, a.y, a.z);
    pos.setXYZ(1, b.x, b.y, b.z);
    pos.needsUpdate = true;
  }
}

function updateHUD(data) {
  if (data.running !== undefined) {
    document.getElementById('cnt-running').textContent = data.running;
    document.getElementById('cnt-waiting').textContent = data.waiting;
    document.getElementById('cnt-idle').textContent = data.idle;
    document.getElementById('cnt-error').textContent = data.error;
  }
}

// ── WebSocket ────────────────────────────────────────────────────────
const WS_URL = 'ws://127.0.0.1:3847';
let ws = null;

function connect() {
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    document.getElementById('ws-status').textContent = 'Connected';
    document.getElementById('ws-status').className = 'connected';

    // Subscribe to all channels
    ws.send(JSON.stringify({ type: 'subscribe', channels: ['sessions', 'relationships', 'canvas', 'groups'] }));

    // Initial data load
    ws.send(JSON.stringify({ type: 'request', id: 'init-sessions', op: { op: 'list_sessions' } }));
    ws.send(JSON.stringify({ type: 'request', id: 'init-status', op: { op: 'status' } }));
  };

  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);

    switch (msg.type) {
      case 'welcome':
        console.log('Agent Hand v' + msg.version);
        break;

      case 'push':
        if (msg.channel === 'sessions') {
          sessions = msg.data;
          rebuildNodes();
        } else if (msg.channel === 'relationships') {
          relationships = msg.data;
          rebuildEdges();
        }
        break;

      case 'response':
        if (msg.id === 'init-sessions') {
          sessions = msg.data;
          rebuildNodes();
        } else if (msg.id === 'init-status') {
          updateHUD(msg.data);
        }
        break;

      case 'error':
        console.error('WS error:', msg.message);
        break;
    }
  };

  ws.onclose = () => {
    document.getElementById('ws-status').textContent = 'Disconnected — reconnecting...';
    document.getElementById('ws-status').className = 'disconnected';
    setTimeout(connect, 3000);
  };

  ws.onerror = () => ws.close();
}

connect();

// ── Animation Loop ───────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  simulate();
  updateMeshPositions();
  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>

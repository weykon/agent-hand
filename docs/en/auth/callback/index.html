\"}]},\"features\":{\"title\":\"Key Features\",\"subtitle\":\"Free \u0026 open source — no account required\",\"free\":[{\"icon\":\"🔍\",\"title\":\"Status Detection\",\"desc\":\"Clear visual indicators show WAITING, RUNNING, READY, or IDLE status at a glance.\"},{\"icon\":\"🎯\",\"title\":\"Priority Jump (Ctrl+N)\",\"desc\":\"Instantly jump to the most urgent session. Never miss a confirmation prompt again.\"},{\"icon\":\"⚡\",\"title\":\"Fuzzy Switcher (Ctrl+G)\",\"desc\":\"Search and switch to any session in milliseconds. Type a few chars, jump directly.\"},{\"icon\":\"📊\",\"title\":\"PTY Monitoring\",\"desc\":\"Real-time pseudo-terminal usage tracking with system-wide gauge and warnings.\"},{\"icon\":\"📁\",\"title\":\"Groups \u0026 Labels\",\"desc\":\"Organize sessions by project with custom titles and colored labels.\"},{\"icon\":\"🔒\",\"title\":\"tmux Isolation\",\"desc\":\"Dedicated tmux server won't touch your default tmux. Your configs, your workflow.\"},{\"icon\":\"🔗\",\"title\":\"Multi-Tool Hooks\",\"desc\":\"Works with Claude Code, Gemini CLI, Cursor, Codex, and Windsurf. Hooks auto-register on first run.\"},{\"icon\":\"🌐\",\"title\":\"Chinese Language\",\"desc\":\"Auto-detects system locale. Full Chinese translation for CLI and TUI.\"}],\"proLabel\":\"PRO\",\"proTitle\":\"Pro Features\",\"proSubtitle\":\"$$19 one-time — unlock the full toolkit\",\"pro\":[{\"icon\":\"🗺️\",\"title\":\"Canvas Workflow Editor\",\"desc\":\"Visual node graph to map session workflows. Drag nodes, draw edges, auto-layout. Auto-saves on exit.\"},{\"icon\":\"🔀\",\"title\":\"Session Relationships\",\"desc\":\"Link sessions as parent-child, dependency, or collaboration. Dedicated relationship viewer with Ctrl+E.\"},{\"icon\":\"📚\",\"title\":\"Skills Library\",\"desc\":\"Browse, sync, and share reusable prompt skills. Git-based community repository.\"},{\"icon\":\"🔔\",\"title\":\"Sound Notifications\",\"desc\":\"Audio alerts when sessions need attention. Cross-platform with configurable sound packs.\"},{\"icon\":\"♻️\",\"title\":\"Session Resume\",\"desc\":\"Resume AI sessions across restarts. Auto-detects tool session IDs for Claude, Gemini, Cursor.\"},{\"icon\":\"📡\",\"title\":\"Remote Sharing\",\"desc\":\"Share live terminal sessions via WebSocket relay. Read-only or read-write mode with auto-expire.\"}],\"maxLabel\":\"MAX\",\"maxTitle\":\"Max Features\",\"maxSubtitle\":\"$$9/mo — AI-powered insights and cross-network collaboration\",\"max\":[{\"icon\":\"🤖\",\"title\":\"AI Session Summarizer\",\"desc\":\"One-key AI summary of any session output. Supports DeepSeek, Claude, Ollama, and OpenAI-compatible providers.\"},{\"icon\":\"🧠\",\"title\":\"Collaborative Context\",\"desc\":\"Capture relationship context with snapshots and annotations. Feed context into new sessions.\"},{\"icon\":\"🌍\",\"title\":\"Remote Session Nodes\",\"desc\":\"Add canvas nodes for sessions on other machines. Cross-network relationship mapping.\"}]},\"preview\":{\"title\":\"See It In Action\",\"alt\":\"Agent Hand — AI terminal session manager dashboard showing Claude Code, Gemini CLI sessions with status indicators\"},\"install\":{\"title\":\"Get Started\",\"tabUnix\":\"macOS / Linux / WSL\",\"tabWindows\":\"Windows\",\"oneLiner\":\"One-Liner Install\",\"oneLinerDesc\":\"Works on macOS, Linux, and WSL. The script auto-installs tmux if needed.\",\"windowsInstall\":\"Windows Install\",\"option1\":\"Option 1: WSL (Recommended)\",\"option1Desc\":\"Install\",\"option1Link\":\"WSL\",\"option1Suffix\":\", then run in the WSL terminal:\",\"option2\":\"Option 2: Native PowerShell (Advanced)\",\"option2Desc\":\"Requires a POSIX layer with tmux (e.g. MSYS2/Cygwin).\",\"wslNote\":\"Recommended: use the macOS/Linux command inside\",\"wslNoteLink\":\"WSL\",\"wslNoteSuffix\":\". Native PowerShell requires a POSIX layer with tmux (e.g. MSYS2).\",\"buildFromSource\":\"Build from Source\",\"rustRequired\":\"Rust toolchain required\",\"copy\":\"Copy\",\"copied\":\"Copied!\"},\"stats\":{\"items\":[{\"value\":\"\u003c50ms\",\"label\":\"Startup Time\"},{\"value\":\"~8MB\",\"label\":\"Memory Usage\"},{\"value\":\"2.7MB\",\"label\":\"Binary Size\"},{\"value\":\"Rust\",\"label\":\"Powered\"}]},\"pricing\":{\"title\":\"Simple Pricing\",\"subtitle\":\"Core features are free forever. Pro is one-time. Max is a subscription.\",\"monthly\":\"Monthly\",\"yearly\":\"Yearly\",\"save\":\"Save ~$19\",\"free\":{\"name\":\"Free\",\"price\":\"$$0\",\"features\":[\"Session management TUI\",\"Status detection + priority jump\",\"Multi-tool hooks (Claude, Gemini, Cursor)\",\"Groups, labels, fuzzy search\",\"Chinese + English\"],\"cta\":\"Get Started Free\"},\"pro\":{\"name\":\"Pro\",\"price\":\"$$19\",\"period\":\"one-time\",\"features\":[\"Everything in Free\",\"Canvas workflow editor\",\"Session relationships\",\"Skills library\",\"Sound notifications\",\"Session resume\",\"Remote sharing\"],\"cta\":\"Buy License\"},\"max\":{\"name\":\"Max\",\"popular\":\"POPULAR\",\"features\":[\"Everything in Pro\",\"AI Session Summarizer\",\"Collaborative context capture\",\"Remote session nodes\"],\"cta\":\"Subscribe\"},\"activateNote\":\"After purchase, run {command} to activate.\"},\"story\":{\"title\":\"From the Creator\",\"p1\":\"In early 2025, I was juggling {highlight} simultaneously. Four terminal windows, each with 3-4 tmux panes. 'Did I already respond to that prompt?' 'Which Claude is working on which task?' Wasting 10+ minutes just finding the right session.\",\"p1Highlight\":\"5+ Claude Code instances\",\"p2\":\"I tried the original agent-deck (Go) and loved the concept, but wanted better performance, more features, and cleaner integration. Agent Hand was born — a Rust rewrite that keeps what works and adds what I needed.\",\"footer\":\"The best tool is the one you'll actually use.\"},\"faq\":{\"title\":\"Frequently Asked Questions\",\"questions\":[{\"q\":\"What is Agent Hand?\",\"a\":\"Agent Hand is a fast, Rust-based terminal session manager (TUI) for AI coding agents like Claude Code, Gemini CLI, Cursor, Codex, and Windsurf. It uses tmux for isolation, letting you manage 5+ concurrent AI sessions from one dashboard with status detection, priority jump, fuzzy search, a canvas workflow editor, and an AI session summarizer.\"},{\"q\":\"How do I install Agent Hand?\",\"a\":\"Run: curl -fsSL https://raw.githubusercontent.com/weykon/agent-hand/master/install.sh | bash — works on macOS, Linux, and WSL. Or build from source with cargo build --release.\"},{\"q\":\"Is Agent Hand free?\",\"a\":\"Yes, the core session manager is free and open source (MIT) with status detection, priority jump, fuzzy search, multi-tool hooks, and Chinese language support. Pro ($19 one-time) adds the canvas workflow editor, session relationships, skills library, sound notifications, session resume, and remote sharing. Max ($9/month) adds the AI session summarizer, collaborative context capture, and remote session nodes.\"},{\"q\":\"Does Agent Hand work with Claude Code?\",\"a\":\"Yes. Agent Hand was originally built to manage multiple Claude Code sessions. It detects session status (Waiting, Running, Idle), lets you priority-jump to sessions needing input with Ctrl+N, and provides fuzzy search across all sessions with Ctrl+G.\"},{\"q\":\"How is Agent Hand different from tmux?\",\"a\":\"Agent Hand runs on top of tmux (using a dedicated server so it won't touch your config). It adds AI-agent-specific features: automatic status detection, priority jumping, session grouping, PTY monitoring, and a visual dashboard — things raw tmux doesn't provide.\"}]},\"support\":{\"title\":\"Need Help?\",\"syncNote\":\"Payment not showing up? Run {command} to sync your license from the server.\",\"contactNote\":\"Still having issues? Contact\",\"contactEmail\":\"weykon@qq.com\"},\"footer\":{\"github\":\"GitHub\",\"releases\":\"Releases\",\"terms\":\"Terms\",\"privacy\":\"Privacy\",\"refund\":\"Refund Policy\",\"license\":\"MIT License\"},\"account\":{\"title\":\"Account\",\"signInD
